spring:
  profiles: nacos
  application:
    name: gateway-service
  zipkin:
    base-url: http://localhost:9411
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
    gateway:
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: api-codes
          uri: lb://INDEX-CODES-SERVICE
          predicates:
            - Path=/api-codes/**
        - id: api-backtest
          uri: lb://TREND-TRADING-BACKTEST-SERVICE
          predicates:
            - Path=/api-backtest/**
        - id: api-view
          uri: lb://TREND-TRADING-BACKTEST-VIEW
          predicates:
            - Path=/api-view/**

eureka:
  client:
    enabled: false

management:
  endpoint:
    prometheus:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
