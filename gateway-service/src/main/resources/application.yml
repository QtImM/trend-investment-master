spring:
  application:
    name: gateway-service
  zipkin:
    base-url: http://localhost:9411
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: trend-web
          uri: ${trend.web.dev-server-url:http://127.0.0.1:5173}
          predicates:
            - Path=/trend-web/**
        - id: api-market
          uri: lb://MARKET-DATA-SERVICE
          predicates:
            - Path=/api-market/**
          filters:
            - StripPrefix=1
        - id: api-backtest
          uri: lb://TREND-TRADING-BACKTEST-SERVICE
          predicates:
            - Path=/api-backtest/**
        - id: api-view
          uri: lb://TREND-TRADING-BACKTEST-VIEW
          predicates:
            - Path=/api-view/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoint:
    prometheus:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
