spring:
  application:
    name: gateway-service
  zipkin:
    base-url: http://localhost:9411
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: trend-web
          uri: ${trend.gateway.view-uri:http://127.0.0.1:8041}
          predicates:
            - Path=/trend-web/**
        - id: api-market
          uri: lb://market-data-service
          predicates:
            - Path=/api-market/**
          filters:
            - StripPrefix=1
        - id: api-backtest
          uri: lb://trend-trading-backtest-service
          predicates:
            - Path=/api-backtest/**
          filters:
            - StripPrefix=1
        - id: api-view
          uri: lb://trend-trading-backtest-view
          predicates:
            - Path=/api-view/**
          filters:
            - StripPrefix=1

eureka:
  client:
    enabled: false

management:
  endpoint:
    prometheus:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

trend:
  gateway:
    view-uri: http://127.0.0.1:8041
