spring:
  config:
    activate:
      on-profile: nacos
    import: optional:nacos:market-data-service-dev.yaml
  application:
    name: market-data-service
  zipkin:
    base-url: http://localhost:9411
  cloud:
    nacos:
      config:
        enabled: true
        server-addr: 127.0.0.1:8848
        file-extension: yaml
      discovery:
        enabled: true
        server-addr: 127.0.0.1:8848

eureka:
  client:
    enabled: false
