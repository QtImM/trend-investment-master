spring:
  profiles:
    default: local
  application:
    name: market-data-service
  data:
    redis:
      host: localhost
      port: 6379
  zipkin:
    base-url: http://localhost:9411
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

market:
  sync:
    third-party-base-url: http://127.0.0.1:8090/indexes
    interval-ms: 60000
    initial-delay-ms: 15000

management:
  endpoint:
    prometheus:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
