spring:
  application:
    name: market-data-service
  zipkin:
    base-url: http://localhost:9411

market:
  sync:
    third-party-base-url: http://127.0.0.1:8090/indexes
    interval-ms: 60000
    initial-delay-ms: 15000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoint:
    prometheus:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
