spring:
  profiles: nacos
  application:
    name: trend-trading-backtest-service
  zipkin:
    base-url: http://localhost:9411
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848

eureka:
  client:
    enabled: false

feign:
  hystrix:
    enabled: ${backtest.remote.index-data.feign.hystrix-enabled:true}

backtest:
  remote:
    index-data:
      mode: feign
      feign:
        hystrix-enabled: true
      fallback:
        enabled: true
      resilience4j:
        enabled: false
        failure-rate-threshold: 50
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state-ms: 10000
      http:
        base-url: http://localhost:8021

management:
  endpoints:
    web:
      exposure:
        include: "*"
      cors:
        allowed-origins: "*"
        allowed-methods: "*"
