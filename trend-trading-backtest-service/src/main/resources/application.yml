eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
spring:
  application:
    name:  trend-trading-backtest-service
  zipkin:
    base-url: http://localhost:9411

backtest:
  remote:
    index-data:
      mode: feign
      fallback:
        enabled: true
      resilience4j:
        enabled: false
        failure-rate-threshold: 50
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state-ms: 10000
      http:
        base-url: http://localhost:8061

management:
  endpoint:
    prometheus:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      cors:
        allowed-origins: "*"
        allowed-methods: "*"
  metrics:
    tags:
      application: ${spring.application.name}
